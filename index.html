<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manglish - മലയാളം എഴുതാം</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --sidebar-bg: #fff;
            --main-bg: #fff;
            --text-color: #333;
            --accent-color: #34a853; /* Google Green for accent */
            --border-color: #e0e0e0;
            --primary-button-bg: #fff;
            --primary-button-text: #5f6368;
            --selected-button-bg: #e6f7ff;
            --selected-button-text: #000;
            --toolbar-icon-color: #5f6368;
            --status-button-bg: #f5f5f5;
            --primary-bg: #121212;
            --sidebar-bg: #1e1e1e;
            --main-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333;
            --primary-button-text: #aaa;
            --toolbar-icon-color: #aaa;
            --status-button-bg: #2d2d2d;
        }

        * {
            box-sizing: border-color;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-window {
            width: 1000px;
            height: 650px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* Side Bar (Left) */
        .sidebar {
            width: 180px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: space-between;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .brand-logo {
            width: 24px;
            height: 24px;
            background-color: #f1f3f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
        }

        .new-file-btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .new-file-btn:hover {
            opacity: 0.9;
        }

        .drafts-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-header {
            font-size: 0.8rem;
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
        }

        .draft-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .draft-item.selected {
            background-color: var(--selected-button-bg);
            border: 1px solid var(--accent-color);
        }

        .draft-icon {
            color: var(--accent-color);
        }

        .draft-title {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* User Profile Section (at bottom of sidebar) */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: #fff;
            background-image: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        .user-details {
            display: flex;
            flex-direction: column;
            font-size: 0.8rem;
        }

        .user-name {
            font-weight: 600;
        }

        .user-role {
            color: #888;
        }

        /* Main Workspace (Right) */
        .main-workspace {
            flex: 1;
            background-color: var(--main-bg);
            display: flex;
            flex-direction: column;
        }

        /* Top Header & Toolbar */
        .header-toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            gap: 5px;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background-color: var(--border-color);
            margin: 0 5px;
        }

        .font-dropdown, .font-size {
            font-size: 0.9rem;
            border: 1px solid transparent;
            padding: 5px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .font-dropdown:hover, .font-size:hover {
            border-color: var(--border-color);
            background-color: #f1f3f4;
        }

        .toolbar-button {
            background: none;
            border: none;
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--toolbar-icon-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .toolbar-button:hover {
            background-color: #f1f3f4;
        }

        .toolbar-icon {
            font-size: 1.1rem;
        }

        /* Main Text Area */
        .text-area {
            flex: 1;
            padding: 30px;
            border: none;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-color);
            resize: none;
            outline: none;
        }

        /* Bottom Status Bar */
        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            border-top: 1px solid var(--border-color);
            background-color: #fff;
            gap: 15px;
            position: relative;
        }

        .language-toggles {
            display: flex;
            align-items: center;
            background-color: var(--status-button-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .lang-toggle-button {
            background: none;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            color: var(--primary-button-text);
        }

        .lang-toggle-button.selected {
            background-color: var(--selected-button-bg);
            color: var(--accent-color);
            font-weight: 600;
        }

        .action-button {
            background-color: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--primary-button-text);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-button:hover {
            background-color: #f1f3f4;
        }

        .status-button-caret {
            position: absolute;
            right: 20px;
            color: var(--toolbar-icon-color);
            cursor: pointer;
        }

        /* Caret icon */
        .caret {
            margin-top: -2px;
        }
    </style>
</head>
<body>

<div class="app-window">
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="brand">
                <div class="brand-logo">&#129671;</div> Manglish
            </div>
            <button class="new-file-btn">
                <span>&#10010;</span>
                New File
            </button>
            <div class="drafts-section">
                <div class="section-header">Today</div>
                <div class="draft-item selected">
                    <span class="draft-icon">&#128196;</span>
                    <span class="draft-title">New File</span>
                </div>
            </div>
        </div>

        <div class="user-profile">
            <div class="avatar">KM</div>
            <div class="user-details">
                <span class="user-name">Kiran Mathew</span>
                <span class="user-role">User</span>
            </div>
        </div>
    </aside>

    <main class="main-workspace">
        <header class="header-toolbar">
            <div class="toolbar-group">
                <button class="toolbar-button" title="Undo"><span class="toolbar-icon caret">&#10554;</span></button>
                <button class="toolbar-button" title="Redo"><span class="toolbar-icon caret">&#10555;</span></button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-group">
                <div class="font-dropdown">Default <span class="caret">&#9662;</span></div>
                <div class="font-size">12 <span class="caret">&#9662;</span></div>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-group">
                <button class="toolbar-button" title="Bold"><b>B</b></button>
                <button class="toolbar-button" title="Italic"><i>I</i></button>
                <button class="toolbar-button" title="Underline"><u>U</u></button>
                <button class="toolbar-button" title="Text Color"><span class="toolbar-icon">A</span></button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-group">
                <button class="toolbar-button" title="More options"><span class="toolbar-icon">&#10247;</span></button>
            </div>
        </header>

        <textarea class="text-area">ഇവിടെ മലയാളം എഴുതാം...</textarea>

        <footer class="status-bar">
            <div class="language-toggles">
                <button class="lang-toggle-button selected">മലയാളം</button>
                <button class="lang-toggle-button">English</button>
            </div>
            <button class="action-button">
                <span>&#127897;</span>
                Voice Typing
            </button>
            <button class="action-button">
                <span>&#128203;</span>
                Copy
            </button>
            <span class="status-button-caret caret">&#9662;</span>
        </footer>
    </main>
</div>

</body>
</html>
